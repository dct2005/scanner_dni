<div class="container-upload">
    <h2>Lector de DNI por Imagen</h2>

    <div class="upload-box" *ngIf="!datosDni">
        <label for="file-input" class="custom-file-upload">
            <span *ngIf="!cargando">📁 Seleccionar imagen del QR</span>
            <span *ngIf="cargando">Procesando...</span>
        </label>
        <input id="file-input" type="file" (change)="onFileSelected($event)" accept="image/*" />
        <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>
    </div>

    <div class="result-card" *ngIf="datosDni">
        <h3>Datos del DNI</h3>
        <hr>
        <div class="info-grid">
            <p><strong>Número:</strong> {{ datosDni.numero || '---' }}</p>
            <p><strong>Nombre:</strong> {{ datosDni.nombre || '---' }}</p>
            <p><strong>Apellidos:</strong> {{ datosDni.apellido1 }} {{ datosDni.apellido2 }}</p>
            <p><strong>F. Nacimiento:</strong> {{ datosDni.fechaNacimiento || '---' }}</p>
            <p *ngIf="datosDni.raw"><strong>Contenido:</strong> {{ datosDni.raw }}</p>
        </div>
        <button class="btn-clear" (click)="limpiar()">Subir otro</button>
    </div>
</div>
