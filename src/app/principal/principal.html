<div class="container-app">
    <header class="main-header">
        <h1>Lector de DNI Inteligente</h1>
        <p>Sube la imagen del QR para procesar los datos automáticamente</p>
    </header>

    @if (!datosDni()) {
    <div class="upload-section">
        <label for="file-input" class="upload-card" [class.loading]="cargando()">
            <div class="icon-box">
                @if (!cargando()) {
                <span>📂</span>
                } @else {
                <div class="spinner"></div>
                }
            </div>
            <div class="text-box">
                @if (!cargando()) {
                <h3>Seleccionar imagen del DNI</h3>
                } @else {
                <h3>Analizando documento...</h3>
                }
                <p>Formatos aceptados: JPG, PNG, WEBP</p>
            </div>
        </label>
        <input id="file-input" type="file" (change)="onFileSelected($event)" accept="image/*" [disabled]="cargando()" />

        @if (errorMsg()) {
        <div class="error-toast">⚠️ {{ errorMsg() }}</div>
        }
    </div>
    }

    @if (datosDni()) {
    <div class="dashboard">
        <aside class="preview-sidebar">
            <div class="card preview-card">
                <h3>Documento Original</h3>
                <div class="image-container">
                    <img [src]="imagePreview()" alt="DNI subido">
                </div>
                <button class="btn-secondary" (click)="limpiar()">Limpiar y volver</button>
            </div>
        </aside>

        <main class="form-content">
            <div class="card form-card">
                <h3>Datos Extraídos</h3>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Contenido RAW del QR</label>
                        <div class="raw-data">{{ datosDni().raw }}</div>
                    </div>

                    <div class="form-group">
                        <label>Número de Documento</label>
                        <input type="text" [value]="datosDni().numero" readonly>
                    </div>

                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <input type="text" [value]="datosDni().fechaNacimiento" readonly>
                    </div>

                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" [value]="datosDni().nombre" readonly>
                    </div>

                    <div class="form-group">
                        <label>Lugar de Nacimiento</label>
                        <input type="text" [value]="datosDni().lugarNacimiento" readonly>
                    </div>

                    <div class="form-group full">
                        <label>Domicilio</label>
                        <input type="text" [value]="datosDni().domicilio" readonly>
                    </div>

                    <div class="form-group">
                        <label>Nacionalidad</label>
                        <input type="text" [value]="datosDni().nacionalidad" readonly>
                    </div>
                </div>
            </div>
        </main>
    </div>
    }
</div>
